<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FlightRadar Mini</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:#0f172a;

      font-family:Arial, Helvetica, sans-serif;
    }

    .container{
      background:#1e293b;

      color:white;

      width:400px;

      padding:30px;

      border-radius:20px;

      text-align:center;

      box-shadow:0 10px 20px rgba(0,0,0,0.4);
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;

      margin-bottom:20px;
    }

    button{
      background:#3b82f6;

      color:white;

      border:none;

      padding:12px 20px;

      border-radius:10px;

      cursor:pointer;

      font-size:16px;

      transition:0.3s;
    }

    button:hover{
      background:#2563eb;

      transform:scale(1.05);
    }

    .card{
      background:#334155;

      margin-top:20px;

      padding:20px;

      border-radius:15px;

      text-align:left;
    }

    .card p{
      margin-top:10px;

      color:white;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>✈️ FlightRadar Mini</h1>

    <p>Status de voos em tempo real</p>

    <button onclick="buscarVoos()">
      Buscar Voos
    </button>

    <div id="resultado"></div>

  </div>

  <script>

    async function buscarVoos(){

      const resultado =
        document.getElementById("resultado");

      resultado.innerHTML =
        "Carregando voos...";

      try{

        const resposta = await fetch(
          "https://api.aviationstack.com/v1/flights?access_key=SUA_KEY"
        );

        const dados = await resposta.json();

        const voo = dados.data[0];

        resultado.innerHTML = `
        
          <div class="card">

            <h2>${voo.airline.name}</h2>

            <p>
              <strong>Voo:</strong>
              ${voo.flight.iata}
            </p>

            <p>
              <strong>Status:</strong>
              ${voo.flight_status}
            </p>

            <p>
              <strong>Saída:</strong>
              ${voo.departure.airport}
            </p>

            <p>
              <strong>Destino:</strong>
              ${voo.arrival.airport}
            </p>

          </div>

        `;

      } catch(error){

        resultado.innerHTML =
          "Erro ao carregar os voos.";

      }

    }

  </script>

</body>
</html>
